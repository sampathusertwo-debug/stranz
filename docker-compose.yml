version: '3.8'

services:
  # Next.js Application
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: transport-book-nextjs
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # Set to 'false' to use local SQLite, 'true' for Supabase
      - USE_SUPABASE=false
      # Add your Supabase credentials here when USE_SUPABASE=true
      - NEXT_PUBLIC_SUPABASE_URL=https://kptqknsghqmfkxtdsgmr.supabase.co
      - NEXT_PUBLIC_SUPABASE_ANON_KEY=sb_publishable_zudf22VVDB2u1wgCEv6XuA_5zzW2C7T
    volumes:
      # Mount data directory for SQLite (if needed for development)
      - ./data:/app/data
    networks:
      - transport-network
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: transport-book-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # Uncomment below for SSL certificates
      # - ./certs:/etc/nginx/certs:ro
    depends_on:
      - nextjs
    networks:
      - transport-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  transport-network:
    driver: bridge

volumes:
  data:
    driver: local
